[build]
  base = "my-fit-platform"
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Публичные NEXT_PUBLIC_* попадают в клиентский бандл — не считать утечкой
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
