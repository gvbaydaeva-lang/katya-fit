name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: my-fit-platform/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix my-fit-platform

      - name: Build static export
        run: npm run export --prefix my-fit-platform

      - name: Verify build output
        run: |
          ls -la my-fit-platform/out
          test -f my-fit-platform/out/index.html

      - name: Add .nojekyll
        run: touch my-fit-platform/out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./my-fit-platform/out
          force_orphan: true
