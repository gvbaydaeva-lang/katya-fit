name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --prefix my-fit-platform

      - name: Build static export
        run: npm run export --prefix my-fit-platform

      - name: Verify build output
        run: |
          test -d my-fit-platform/out
          test -f my-fit-platform/out/index.html
          ls -la my-fit-platform/out

      - name: Add .nojekyll
        run: touch my-fit-platform/out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./my-fit-platform/out
          publish_branch: gh-pages
          force_orphan: true
